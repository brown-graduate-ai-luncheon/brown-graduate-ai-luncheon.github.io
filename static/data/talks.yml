- speaker: "Gabriel Franco"
  speakerlink: https://gaabrielfranco.github.io/
  title: "Understanding Attention from First Principles: From Singular Vectors to Interpretable Causal Circuits"
  affiliation: Boston University (Graduate Student)
  abstract: "The attention mechanism is a foundational building block of modern large language models (LLMs). However, a fundamental question in mechanistic interpretability is: why does an attention head attend to a specific token pair? This talk presents a unified, first-principles framework to address this question. We first establish a sound theoretical and empirical justification for identifying attention features, demonstrating that the singular vectors of attention matrices robustly align with feature representations. Building on this observation, we introduce ACC++, a method for extracting low-dimensional signals that are causal to attention, using only a single forward pass. We then use ACC++ to trace per-prompt circuits, showing that circuits are intrinsically prompt-specific, and that averaging over prompts obscures distinct underlying mechanisms. We demonstrate how prompt-specific circuits cluster into families, and we propose the notion of a representative circuit to analyze the differences between these families. Finally, we introduce a fully automated pipeline that leverages ACC++ signals to discover highly interpretable circuits across multiple LLMs, shedding light on algorithmic differences between prompt-specific circuits."
  date: 2026-03-12
  time: 12pm
  location: Barus House, 340 Brook St, Providence, RI 02912

- speaker: "Rico Angell"
  speakerlink: https://rangell.github.io/
  title: "Jailbreak Vulnerability Emerges from Shared Representations"
  affiliation: NYU (Postdoc)
  abstract: "Jailbreak transferability is the surprising phenomenon where an adversarial prompt compromising one model also elicits harmful responses from other models. Despite widespread demonstrations, there is little consensus on why transfer is possible: is it a quirk of safety training, an artifact of model families, or a more fundamental property of representation learning? In this talk, we present evidence that transferability emerges from shared representations rather than incidental flaws. We find two factors that systematically shape transfer: (1) model representational similarity and (2) the strength of the jailbreak on the source model. Furthermore, our qualitative analyses reveal systematic transferability patterns across different types of jailbreaks. Together, these results reframe jailbreak transfer as a consequence of representation alignment rather than a fragile by-product of safety training."
  date: 2026-02-26
  time: 12pm
  location: Barus House, 340 Brook St, Providence, RI 02912

- speaker: "Hadas Orgad"
  speakerlink: https://orgadhadas.github.io/
  title: "Large Language Models Generate Harmful Content Using a Unified Mechanism"
  affiliation: Kempner Institute (Research Fellow)
  abstract: "Large language models (LLMs) undergo alignment training to avoid harmful behaviors, yet the resulting safeguards remain brittle: jailbreaks routinely bypass them, and fine-tuning on narrow domains can induce \"emergent misalignment\" that generalizes broadly. It remains unclear whether this brittleness reflects fundamental limits of alignment or merely our failure to leverage model capabilities. Here we use targeted weight pruning as a causal intervention to probe the internal organization of harmfulness in LLMs. We demonstrate that harmful content generation depends on a compact set of weights that are general across harm types and distinct from benign capabilities. Aligned models show greater compression of harm generation weights than unaligned counterparts, indicating that alignment reshapes harmful representations internally---even as safety guardrails remain brittle at the surface. This explains emergent misalignment: if weights of harmful capabilities are compressed, fine-tuning that engages these weights in one domain can trigger broad misalignment. Consistent with this, pruning harm-generation weights in a narrow domain substantially reduces emergent misalignment. Notably, harm generation and reasoning are dissociable---models can lose the ability to produce harmful content while retaining the ability to recognize and explain it. Together, these results reveal a coherent internal structure for harmfulness in LLMs that may serve as a foundation for more principled approaches to safety."
  date: 2026-02-12
  time: 12pm
  location: Barus House, 340 Brook St, Providence, RI 02912